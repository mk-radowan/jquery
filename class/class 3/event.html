<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Events Complete</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input,
        select {
            padding: 8px;
            width: 250px;
        }
    </style>
</head>

<body>

    <h2>jQuery Form Events</h2>

    <form id="myForm">
        <div class="form-group">
            <label>Name :</label><br>
            <input type="text" id="name" placeholder="Type something...">
            <span id="nameStatus"></span>
        </div>

        <div class="form-group">
            <label>Email:</label><br>
            <input type="email" id="email" placeholder="Enter email">
        </div>

        <div class="form-group">
            <label>Focus Example:</label><br>
            <input type="text" id="e" placeholder="Click here to focus">
        </div>

        <div class="form-group">
            <label>City:</label><br>
            <select id="city">
                <option value="dhaka">Dhaka</option>
                <option value="khulna">Khulna</option>
                <option value="rajshahi">Rajshahi</option>
            </select>
        </div>

        <button type="submit">Submit Form</button>
    </form>

    <script>
        $(document).ready(function () {

            // Form Submit Event
            $("#myForm").submit(function (e) {
                e.preventDefault();
                alert("Form Submitted Successfully!");
            });

            // Change Event 
            $("#city").change(function () {
                var selectedCity = $(this).val();
                alert("City Changed to: " + selectedCity);
            });

            // Blur Event 
            $("#email").blur(function () {
                $(this).css("background", "green");
                $(this).css("color", "white");
            });

            // Focus Event 
            $("#e").focus(function () {
                $(this).css("background", "lightblue");
            });

            // Keypress/Keyup Event
            $("#name").keyup(function () {
                var val = $(this).val();
                $("#nameStatus").text(" typing: " + val);
                $(this).css("background", "yellow");
            });

            // Select Event 
            $("#name").select(function () {
                alert("You selected some text!");
            });

        });
    </script>

</body>

</html>
